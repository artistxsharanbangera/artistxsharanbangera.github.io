<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Portrait</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  color: #fff;
  background: #000;
  padding: 40px 20px;
}

/* Background */
.bg-glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("images/bg.jpg") center/cover no-repeat;
  opacity: 0.25;
  filter: blur(2px);
  z-index: -1;
}

/* Container */
.container {
  max-width: 600px;
  margin: auto;
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
}

h1 {
  text-align: center;
  margin-bottom: 25px;
}

label {
  display: block;
  margin-top: 12px;
  margin-bottom: 6px;
  font-size: 14px;
  color: #bbb;
}

input, select, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #222;
  background: #111;
  color: #fff;
}

/* Price Box */
.price-preview {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  text-align: center;
}

.price-preview span {
  font-size: 22px;
  font-weight: 600;
}

/* Button */
button {
  width: 100%;
  padding: 16px;
  background: #fff;
  color: #000;
  border-radius: 999px;
  border: none;
  font-weight: 500;
  cursor: pointer;
}

button:hover {
  background: #ddd;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">
  <h1>Request Your Portrait</h1>

  <form id="form">

    <label>Your Name</label>
    <input type="text" id="name" required>

    <label>Your Email</label>
    <input type="email" id="email" required>

    <label>Phone Number</label>
    <input type="tel" id="phone">

    <label>Type of Portrait</label>
    <select id="type">
      <option value="bw">B/W Pencil Sketch</option>
      <option value="color">Colour Pencil Sketch</option>
    </select>

    <label>Size</label>
    <select id="size">
      <option value="A5">A5</option>
      <option value="A4">A4</option>
      <option value="A3">A3</option>
    </select>

    <label>Number of People</label>
    <input type="number" id="people" min="1" value="1">

    <!-- 💰 PRICE PREVIEW -->
    <div class="price-preview">
      Estimated Price: ₹<span id="price">1000</span>
    </div>

    <label>Preferred Date</label>
    <input type="date" id="date">

    <label>What do you need?</label>
    <select id="intent">
      <option>Call me</option>
      <option>Send quotation</option>
      <option>Ready to book</option>
    </select>

    <label>Paste Image Link</label>
    <input type="text" id="photo" placeholder="Paste Google Drive / WhatsApp link">

    <label>Additional Details</label>
    <textarea id="notes"></textarea>

    <button type="submit">Continue to WhatsApp</button>

  </form>

</div>

<script>
/* 💰 PRICE CALCULATOR */

function calculatePrice() {
  const type = document.getElementById("type").value;
  const size = document.getElementById("size").value;
  const people = parseInt(document.getElementById("people").value) || 1;

  let base = 0;
  let extra = 0;

  if (type === "bw") {
    if (size === "A5") { base = 1000; extra = 500; }
    if (size === "A4") { base = 2500; extra = 1200; }
    if (size === "A3") { base = 7000; extra = 2000; }
  }

  if (type === "color") {
    if (size === "A5") { base = 1500; extra = 700; }
    if (size === "A4") { base = 4000; extra = 1500; }
    if (size === "A3") { base = 9000; extra = 3000; }
  }

  const total = base + (people - 1) * extra;
  document.getElementById("price").innerText = total;
}

document.querySelectorAll("#type, #size, #people").forEach(el => {
  el.addEventListener("change", calculatePrice);
});

calculatePrice();

/* 🚀 WHATSAPP REDIRECT */

document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  const size = document.getElementById("size").value;
  const people = document.getElementById("people").value;
  const date = document.getElementById("date").value;
  const price = document.getElementById("price").innerText;
  const photo = document.getElementById("photo").value;
  const notes = document.getElementById("notes").value;

  const message = 
`Hi, I want to book a portrait.

Name: ${name}
Type: ${type}
Size: ${size}
People: ${people}
Date: ${date}

Estimated Price: ₹${price}

Photo: ${photo}

Notes: ${notes}`;

  const url = `https://wa.me/919945070481?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
});
</script>

</body>
</html>
