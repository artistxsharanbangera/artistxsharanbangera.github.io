<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Portrait</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  color: #fff;
  background: #000;
  padding: 40px 20px;
}

/* Background */
.bg-glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("images/bg.jpg") center/cover no-repeat;
  opacity: 0.25;
  filter: blur(2px);
  z-index: -1;
}

/* Container */
.container {
  max-width: 600px;
  margin: auto;
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* Typography */
h1 {
  text-align: center;
  margin-bottom: 30px;
}

label {
  display: block;
  margin-top: 12px;
  margin-bottom: 6px;
  font-size: 14px;
  color: #bbb;
}

/* Inputs */
input, select, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #222;
  background: #111;
  color: #fff;
  outline: none;
}

input:focus, select:focus, textarea:focus {
  border-color: #555;
}

/* Button */
button {
  width: 100%;
  padding: 16px;
  background: #fff;
  color: #000;
  border-radius: 999px;
  border: none;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #ddd;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">
  <h1>Request Your Portrait</h1>

  <form action="https://formspree.io/f/xqeynzvq" method="POST" enctype="multipart/form-data">

    <label>Your Name</label>
    <input type="text" name="name" placeholder="Enter your name" required>

    <label>Your Email</label>
    <input type="email" name="email" placeholder="Enter your email" required>

    <label>Phone Number</label>
    <input type="tel" name="phone" placeholder="Optional">

    <label>Type of Portrait</label>
    <select name="type">
      <option>B/W Pencil Sketch</option>
      <option>Colour Pencil Sketch</option>
    </select>

    <label>Size</label>
    <select name="size">
      <option>A5</option>
      <option>A4</option>
      <option>A3</option>
    </select>

    <label>Number of People</label>
    <input type="number" name="people" min="1" value="1">

    <label>Preferred Date</label>
    <input type="date" name="date">

    <label>What do you need?</label>
    <select name="intent">
      <option>Call me</option>
      <option>Send quotation</option>
      <option>Ready to book</option>
    </select>

    <label>Upload your photo</label>
    <input type="file" name="photo" accept="image/*">

    <p style="font-size:12px; color:#777;">
      Upload a clear photo OR paste a Google Drive / WhatsApp link
    </p>

    <input type="text" name="photo_link" placeholder="Paste image link here">

    <label>Additional Details</label>
    <textarea name="notes" placeholder="Anything else you'd like to mention..."></textarea>

    <button type="submit">Submit Request</button>

  </form>

  <p style="text-align:center; font-size:12px; color:#777; margin-top:15px;">
    Prefer quick booking? 
    <a href="https://wa.me/919945070481" style="color:#fff;">Message on WhatsApp</a>
  </p>

</div>

</body>
</html>
